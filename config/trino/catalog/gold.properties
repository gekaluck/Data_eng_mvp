connector.name=iceberg
iceberg.catalog.type=jdbc
iceberg.jdbc-catalog.catalog-name=gold
iceberg.jdbc-catalog.driver-class=org.postgresql.Driver
iceberg.jdbc-catalog.connection-url=jdbc:postgresql://postgres:5432/${ENV:ICEBERG_GOLD_CATALOG_DB}
iceberg.jdbc-catalog.connection-user=${ENV:POSTGRES_USER}
iceberg.jdbc-catalog.connection-password=${ENV:POSTGRES_PASSWORD}
iceberg.jdbc-catalog.default-warehouse-dir=s3a://gold/iceberg
iceberg.jdbc-catalog.schema-version=V1
iceberg.register-table-procedure.enabled=true
fs.native-s3.enabled=true
s3.endpoint=${ENV:MINIO_ENDPOINT}
s3.region=us-east-1
s3.path-style-access=true
s3.aws-access-key=${ENV:MINIO_ROOT_USER}
s3.aws-secret-key=${ENV:MINIO_ROOT_PASSWORD}
